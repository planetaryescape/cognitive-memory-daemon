# cargo-deny configuration.
# https://embarkstudios.github.io/cargo-deny/
#
# Adapted from mxr/deny.toml. License allow-list mirrors mxr (we use the same
# Rust ecosystem). Advisory ignores intentionally empty until/unless we hit a
# specific transitive constraint.

[graph]
targets = []
all-features = true

[advisories]
unmaintained = "workspace"
yanked = "warn"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "NCSA",
    "zlib-acknowledgement",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
